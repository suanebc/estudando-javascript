<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo Capítulo 4</title>
</head>

<body>
  <h1>Promgrama Peso Ideal</h1>
  <form>
    <p>Nome:
      <input type="text" id="inNome" required>
    </p>
    <p>Sexo:
      <input type="radio" name="sexo" id="inMasculino" required>Masculino
      <input type="radio" name="sexo" id="inFemenino" required>Feminino
    </p>
    <p>Altura:
      <input type="number" step="0.1" min="0" id="inAltura" required>
    </p>
    <input type="submit" value="Calcular peso Ideal">
    <input type="reset" value="Limpar Campo">
  </form>
  <h3></h3>
  <script src="exemplo2.js"></script>
</body>

</html>
