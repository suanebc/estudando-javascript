<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Exemplo Capítulo 6</title>
</head>
<body>
  <form>
    <h1>Descubra O Número</h1>
    <p>Número:
      <input type="number" min = "1" max="100" id="inNumero" require autofocus>
      <input type="submit" value="Apostar" id="btSubmit">
      <input type="button" value="Jogar Novamente" id="btNovo">
    </p>
  </form>
  <h3>Erros:<span id="outErros">0</span></h3>
  <h3>Chances:<span id="outChances">6</span></h3>
  <h3>Dica: É um número entre 1 e 100</h3>
  <script src="exemplo2.js"></script>
</body>
</html>
