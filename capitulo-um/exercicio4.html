<!DOCTYPE html>

<body>
  <h1>Exercício D</h1>
  <p><b>D)</b> Elabore um programa que leia 2 notas de um aluno em uma disciplina. Calcule e informe a média das notas</p>
  <t4>ultimo exercício do capítulo</t4>
  <script>
    let nota1 = prompt("Digite a primeira nota:");
    let nota2 = prompt("Digite a segunda nota:");
    let media = (parseFloat(nota1)+parseFloat(nota2))/2;
    alert(`Média: ${media}`);
  </script>
</body>
