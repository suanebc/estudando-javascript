  <br>
  <p><b>A - </b> Elabore um programa que leia um número, calule e informe os seus vizinhos, ou seja, o anteriot e
    posterior</p>
  <script>
    let numero = prompt("Digite um número: ");
    let anterior = numero - 1;
    let posterior = parseInt(numero) + 1;
    alert(`O número digitado foi: ${numero}Seu anterior é: ${anterior}Seu posterior é: ${posterior}`);
  </script>

  <p><b>B)</b> Elabore um programa para uma pizzaria,o qual leia o valor total de uma conta e quantos cliente vão pagá-la. Calcule o valor a ser pago por cada cliente.</p>
