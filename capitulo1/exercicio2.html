<!DOCTYPE html>

<body>
  <h1>Exercício B</h1>
  <p><b>B)</b> Elabore um programa para uma pizzaria,o qual leia o valor total de uma conta e quantos cliente vão pagá-la. Calcule o valor a ser pago por cada cliente.</p>
  <script>
    let valorDaConta = prompt("Digite o valor da conta: ");
    let totalDeClientes = prompt("Digite quantos clientes pagarão pelo conta: ");
    let valorPorCliente = parseFloat(valorDaConta)/parseInt(totalDeClientes);
    alert(`O valor para cada cliente é de : ${valorPorCliente}`);
  </script>
   
</body>
</html>
